<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bulk URL Shortener</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b
    );
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    border-radius:30px;
    padding:35px;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.4);
}

.logo{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:220px;
    padding:18px;
    border:none;
    border-radius:18px;
    outline:none;
    resize:none;
    font-size:15px;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:
    linear-gradient(
        135deg,
        #3b82f6,
        #2563eb
    );
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:25px;
    display:none;
}

.link-item{
    background:rgba(0,0,0,0.3);
    padding:18px;
    border-radius:18px;
    margin-bottom:15px;
}

.link-item a{
    color:#38bdf8;
    word-break:break-all;
}

.copy-all{
    margin-top:20px;
    background:
    linear-gradient(
        135deg,
        #10b981,
        #059669
    );
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#64748b;
    font-size:13px;
}

.redirect-box{
    text-align:center;
}

.loader{
    width:90px;
    height:90px;
    border-radius:50%;
    border:6px solid rgba(255,255,255,0.1);
    border-top:6px solid #3b82f6;
    animation:spin 1s linear infinite;
    margin:0 auto 25px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.progress{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    margin-top:25px;
}

.bar{
    width:0%;
    height:100%;
    background:
    linear-gradient(
        90deg,
        #38bdf8,
        #2563eb
    );
    animation:load 1s linear forwards;
}

@keyframes load{
    100%{
        width:100%;
    }
}

.small{
    color:#94a3b8;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container" id="mainContainer">

<div class="logo">
Bulk ShortLink
</div>

<p class="desc">
Paste multiple URLs (1 per line) 🚀
</p>

<textarea
id="bulkUrls"
placeholder="https://google.com
https://youtube.com
https://chatgpt.com">
</textarea>

<button onclick="generateBulkLinks()">
Generate Short Links
</button>

<div class="result" id="resultBox"></div>

<button
class="copy-all"
id="copyAllBtn"
style="display:none;"
onclick="copyAllLinks()">
Copy All Links
</button>

<div class="footer">
Billionaire 🚀🚀🚀
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
child
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAFEqtDXNJI-O1Yn8atXjuDCAGRoQB3Y2Q",

authDomain: "teknodia.firebaseapp.com",

databaseURL:
"https://teknodia-default-rtdb.firebaseio.com",

projectId: "teknodia",

storageBucket: "teknodia.firebasestorage.app",

messagingSenderId: "4635381861",

appId:
"1:4635381861:web:d3a7b001d17fca9e37b68c",

measurementId: "G-WVXTM4Y951"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

function randomCode(length = 6){

const chars =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let result = "";

for(let i=0;i<length;i++){

result += chars.charAt(
Math.floor(Math.random()*chars.length)
);

}

return result;

}

window.generateBulkLinks = async function(){

const textarea =
document.getElementById("bulkUrls");

const urls =
textarea.value
.split("\n")
.map(url => url.trim())
.filter(url => url !== "");

if(urls.length === 0){

alert("Please enter URLs");
return;

}

const resultBox =
document.getElementById("resultBox");

resultBox.innerHTML = "";

resultBox.style.display = "block";

let allLinks = "";

for(const url of urls){

try{

new URL(url);

}catch{

continue;

}

const code = randomCode();

await set(
ref(db,"links/"+code),
{
url:url
}
);

const shortLink =
window.location.origin +
window.location.pathname +
"?s="+code;

allLinks += shortLink + "\n";

resultBox.innerHTML += `

<div class="link-item">

<p>
Original:
</p>

<br>

<a href="${url}" target="_blank">
${url}
</a>

<br><br>

<p>
Short URL:
</p>

<br>

<a href="${shortLink}" target="_blank">
${shortLink}
</a>

</div>

`;

}

window.generatedLinks = allLinks;

document.getElementById(
"copyAllBtn"
).style.display = "block";

};

window.copyAllLinks = function(){

navigator.clipboard.writeText(
window.generatedLinks
);

alert("All links copied!");

};

async function redirectLink(){

const params =
new URLSearchParams(
window.location.search
);

const code = params.get("s");

if(!code) return;

document.getElementById(
"mainContainer"
).innerHTML = `

<div class="redirect-box">

<div class="loader"></div>

<h1>Preparing Destination...</h1>

<p class="small">
Redirecting safely 🚀
</p>

<div class="progress">
<div class="bar"></div>
</div>

</div>

`;

const dbRef = ref(db);

const snapshot = await get(
child(dbRef,"links/"+code)
);

if(snapshot.exists()){

const data = snapshot.val();

setTimeout(()=>{

window.location.href = data.url;

},1000);

}else{

document.getElementById(
"mainContainer"
).innerHTML = `

<h1>404</h1>

<p style="
margin-top:15px;
text-align:center;
color:#cbd5e1;
">
Link not found
</p>

`;

}

}

redirectLink();

</script>

</body>
</html>
